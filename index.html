<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Coaching Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#08080C;--bg1:#0E0E14;--bg2:#14141C;--bg3:#1A1A24;--bg4:#22222E;
--bd:#2A2A38;--bd2:#3A3A4A;
--t1:#F0EEF6;--t2:#B0AEBC;--t3:#78768A;--t4:#55536A;
--ac:#C8A2FF;--ac2:#9B6FE0;--ac3:rgba(200,162,255,.12);
--em:#6EE7B7;--em2:rgba(110,231,183,.12);
--gd:#F5D76E;--gd2:rgba(245,215,110,.12);
--rs:#FB7185;--rs2:rgba(251,113,133,.12);
--bl:#60A5FA;--bl2:rgba(96,165,250,.12);
--cr:#FB923C;--cr2:rgba(251,146,60,.12);
--fd:'Playfair Display',serif;--fb:'DM Sans',sans-serif;--fm:'IBM Plex Mono',monospace;
--r:14px;--r2:10px;--r3:6px;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100vh}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:background .3s}
.login-screen.hidden{display:none}
.login-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:48px;max-width:440px;width:90%;text-align:center}
.login-card h1{font-family:var(--fd);font-size:36px;font-weight:500;margin-bottom:4px}
.login-card h1 span{color:var(--ac)}
.login-card .sub{color:var(--t3);font-size:13px;margin-bottom:32px}
.login-input{width:100%;padding:13px 16px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);
color:var(--t1);font-family:var(--fb);font-size:14px;outline:none;margin-bottom:10px;transition:border-color .2s}
.login-input:focus{border-color:var(--ac)}
.login-btn{width:100%;padding:13px;background:var(--ac);color:var(--bg);border:none;border-radius:var(--r2);
font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.login-btn:hover{background:var(--ac2)}
.login-divider{display:flex;align-items:center;gap:14px;margin:20px 0;color:var(--t4);font-size:11px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.login-ghost{width:100%;padding:11px;background:transparent;border:1px solid var(--bd);border-radius:var(--r2);
color:var(--t2);font-family:var(--fb);font-size:13px;cursor:pointer;transition:all .2s}
.login-ghost:hover{border-color:var(--ac);color:var(--ac)}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.app.hidden{display:none}
.sidebar{width:250px;min-height:100vh;background:var(--bg1);border-right:1px solid var(--bd);
position:fixed;left:0;top:0;bottom:0;z-index:50;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-top{padding:20px 18px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.sidebar-top h1{font-family:var(--fd);font-size:20px;font-weight:600}
.sidebar-top h1 span{color:var(--ac)}
.sidebar-top .logout{background:none;border:none;color:var(--t4);cursor:pointer;font-size:16px;transition:color .2s}
.sidebar-top .logout:hover{color:var(--rs)}
.sidebar-user{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--ac3);border:2px solid var(--ac);
display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ac);flex-shrink:0}
.sidebar-uname{font-size:12px;font-weight:600}.sidebar-urole{font-size:10px;color:var(--t4)}
.nav-sec{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.14em;padding:16px 18px 4px}
.nav-i{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;transition:all .15s;
font-size:12.5px;color:var(--t2);border-left:3px solid transparent}
.nav-i:hover{background:var(--bg3);color:var(--t1)}
.nav-i.active{background:var(--ac3);color:var(--ac);border-left-color:var(--ac)}
.nav-i .ic{width:18px;text-align:center;font-size:13px}
.nav-i .badge{margin-left:auto;font-family:var(--fm);font-size:9px;padding:1px 6px;border-radius:99px;background:var(--bg3);color:var(--t4)}
.main{margin-left:250px;flex:1}
.pg{display:none;animation:fadeIn .35s}.pg.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pg-h{padding:28px 36px 20px;border-bottom:1px solid var(--bd)}
.pg-h h2{font-family:var(--fd);font-size:24px;font-weight:500}
.pg-h p{color:var(--t3);font-size:13px;margin-top:3px}
.pg-b{padding:28px 36px 40px}

/* CARDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cd{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:all .2s}
.cd:hover{border-color:var(--bd2)}.cd::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cd.ac::before{background:var(--ac)}.cd.em::before{background:var(--em)}
.cd.gd::before{background:var(--gd)}.cd.rs::before{background:var(--rs)}.cd.bl::before{background:var(--bl)}
.cd-t{font-size:11px;color:var(--t3);margin-bottom:4px}.cd-v{font-family:var(--fm);font-size:26px;font-weight:600}
.cd.ac .cd-v{color:var(--ac)}.cd.em .cd-v{color:var(--em)}.cd.gd .cd-v{color:var(--gd)}.cd.rs .cd-v{color:var(--rs)}.cd.bl .cd-v{color:var(--bl)}
.cd-s{font-size:10px;color:var(--t4);margin-top:2px}

/* INPUTS */
.irow{display:flex;gap:8px;margin-bottom:14px}
.irow input,.irow select,.irow textarea{flex:1;padding:10px 13px;background:var(--bg3);border:1px solid var(--bd);
border-radius:var(--r2);color:var(--t1);font-family:var(--fb);font-size:13px;outline:none;transition:border-color .2s}
.irow input:focus,.irow textarea:focus{border-color:var(--ac)}
.irow input::placeholder,.irow textarea::placeholder{color:var(--t4)}
.btn{padding:9px 18px;border-radius:var(--r2);font-family:var(--fb);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);transition:all .2s}
.btn-a{background:var(--ac);color:var(--bg);border-color:var(--ac)}.btn-a:hover{background:var(--ac2)}
.btn-g{background:transparent;color:var(--t2)}.btn-g:hover{background:var(--bg3)}

/* TRACKER */
.tk{display:flex;flex-direction:column;gap:5px}
.tk-i{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);transition:all .15s}
.tk-i:hover{border-color:var(--bd2)}
.tk-c{width:20px;height:20px;border-radius:var(--r3);border:2px solid var(--bd);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tk-c.done{background:var(--em);border-color:var(--em)}.tk-c.done::after{content:'✓';color:var(--bg);font-size:11px;font-weight:700}
.tk-t{flex:1;font-size:12.5px}.tk-t.dn{text-decoration:line-through;color:var(--t4)}
.tk-m{font-family:var(--fm);font-size:10px;color:var(--t4)}
.tk-x{width:22px;height:22px;border-radius:50%;background:transparent;border:none;color:var(--t4);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tk-x:hover{background:var(--rs2);color:var(--rs)}

/* TIMER */
.tmr{text-align:center;padding:32px 0}
.tmr-c{width:180px;height:180px;border-radius:50%;border:4px solid var(--bd);margin:0 auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:border-color .3s}
.tmr-c.on{border-color:var(--em)}.tmr-c.ps{border-color:var(--gd)}
.tmr-t{font-family:var(--fm);font-size:44px;font-weight:600}.tmr-l{font-size:11px;color:var(--t3);margin-top:3px}
.tmr-btns{display:flex;gap:10px;justify-content:center;margin-top:14px}
.tmr-b{width:44px;height:44px;border-radius:50%;border:2px solid var(--bd);background:var(--bg2);color:var(--t1);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tmr-b:hover{border-color:var(--ac);background:var(--ac3)}
.presets{display:flex;gap:6px;justify-content:center;margin-top:14px}
.pre{padding:5px 12px;border-radius:99px;background:var(--bg3);border:1px solid var(--bd);color:var(--t3);font-size:10px;font-family:var(--fm);cursor:pointer;transition:all .2s}
.pre:hover,.pre.on{border-color:var(--ac);color:var(--ac);background:var(--ac3)}

/* JOURNAL */
.je{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:10px}
.je-d{font-family:var(--fm);font-size:10px;color:var(--t4);margin-bottom:6px}
.je-t{font-size:12.5px;line-height:1.6;color:var(--t2)}
textarea.jta{width:100%;min-height:90px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:12px;color:var(--t1);font-family:var(--fb);font-size:13px;line-height:1.6;outline:none;resize:vertical;transition:border-color .2s}
textarea.jta:focus{border-color:var(--ac)}textarea.jta::placeholder{color:var(--t4)}

/* PROGRESS */
.pr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pr-l{font-size:11px;width:130px;color:var(--t2)}.pr-tr{flex:1;height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
.pr-f{height:100%;border-radius:99px;transition:width .5s}.pr-p{font-family:var(--fm);font-size:11px;color:var(--t4);width:36px;text-align:right}

/* PRINCIPLES */
.prc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:8px;border-left:4px solid var(--gd)}
.prc-t{font-weight:600;font-size:13px;margin-bottom:3px}.prc-d{font-size:10px;color:var(--t4);margin-bottom:4px}
.prc-b{font-size:12px;color:var(--t2);line-height:1.6}

/* ADMIN CLIENT LIST */
.cl-r{display:grid;grid-template-columns:36px 1fr 120px 80px 100px 70px;align-items:center;gap:12px;padding:13px 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);margin-bottom:6px;transition:all .15s}
.cl-r:hover{border-color:var(--bd2)}
.cl-av{width:32px;height:32px;border-radius:50%;background:var(--ac3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ac)}
.cl-n{font-weight:600;font-size:13px}.cl-c{font-family:var(--fm);font-size:10px;color:var(--t4)}
.cl-s{font-family:var(--fm);font-size:12px;color:var(--em)}.cl-d{font-size:11px;color:var(--t4)}
.cpb{padding:5px 10px;border-radius:99px;background:var(--ac3);border:1px solid rgba(200,162,255,.2);color:var(--ac);font-family:var(--fb);font-size:10px;cursor:pointer;transition:all .2s}
.cpb:hover{background:rgba(200,162,255,.25)}

/* VISION CARDS */
.vis-g{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.vis-c{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:18px;position:relative;overflow:hidden}
.vis-c::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.vis-c:nth-child(1)::before{background:var(--ac)}.vis-c:nth-child(2)::before{background:var(--em)}
.vis-c:nth-child(3)::before{background:var(--gd)}.vis-c:nth-child(4)::before{background:var(--rs)}
.vis-c .per{font-family:var(--fm);font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.vis-c textarea{width:100%;min-height:100px;background:transparent;border:none;color:var(--t1);font-family:var(--fb);font-size:13px;line-height:1.6;resize:vertical;outline:none}

/* SPHERES */
.sph{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.sph-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer}
.sph-hl{display:flex;align-items:center;gap:10px}
.sph-ic{width:32px;height:32px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:15px}
.sph-t{font-size:13px;font-weight:600}.sph-st{font-size:10px;color:var(--t4)}
.sph-tog{color:var(--t4);font-size:11px;transition:transform .3s}.sph.open .sph-tog{transform:rotate(180deg)}
.sph-b{display:none;padding:0 18px 18px}.sph.open .sph-b{display:block}
.mg{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;margin-top:10px}
.mc{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r3);padding:6px 4px;text-align:center}
.mc .mn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t4);margin-bottom:3px}
.mc textarea{width:100%;min-height:36px;background:transparent;border:none;color:var(--t1);font-family:var(--fb);font-size:9px;line-height:1.3;resize:none;outline:none;text-align:center}

/* HEALTH */
.hg{display:grid;grid-template-columns:1fr 1fr;gap:6px}

/* DECOMP MODULE */
.dec-sphere{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.dec-sphere-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;border-bottom:1px solid transparent;transition:all .2s}
.dec-sphere.open .dec-sphere-h{border-bottom-color:var(--bd)}
.dec-sphere-h:hover{background:var(--bg3)}
.dec-sphere-left{display:flex;align-items:center;gap:12px}
.dec-sphere-name{font-size:14px;font-weight:600}
.dec-sphere-goal{font-size:11px;color:var(--t3);max-width:400px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dec-sphere-arrow{color:var(--t4);font-size:11px;transition:transform .3s}
.dec-sphere.open .dec-sphere-arrow{transform:rotate(180deg)}
.dec-sphere-body{display:none;padding:0}
.dec-sphere.open .dec-sphere-body{display:block}

.dec-year-row{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--bg3);border-bottom:1px solid var(--bd)}
.dec-year-row label{font-size:11px;font-weight:600;color:var(--ac);white-space:nowrap;min-width:120px}
.dec-year-row input{flex:1;padding:8px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r3);color:var(--t1);font-family:var(--fb);font-size:13px;outline:none;transition:border-color .2s}
.dec-year-row input:focus{border-color:var(--ac)}

.dec-months{display:flex;overflow-x:auto;border-bottom:1px solid var(--bd)}
.dec-month{min-width:160px;flex:1;border-right:1px solid var(--bd)}
.dec-month:last-child{border-right:none}
.dec-month-h{padding:8px 12px;background:var(--bg3);text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);border-bottom:1px solid var(--bd);position:sticky;top:0;cursor:pointer}
.dec-month-h:hover{color:var(--ac)}
.dec-month-h.active{color:var(--ac);background:var(--ac3)}

.dec-month-goal{padding:8px 10px;border-bottom:1px solid rgba(42,42,56,.5)}
.dec-month-goal input{width:100%;padding:6px 8px;background:transparent;border:1px dashed var(--bd);border-radius:var(--r3);color:var(--gd);font-family:var(--fb);font-size:12px;font-weight:600;outline:none;transition:border-color .2s}
.dec-month-goal input:focus{border-color:var(--gd);border-style:solid}
.dec-month-goal input::placeholder{color:var(--t4);font-weight:400}

.dec-tasks-area{padding:6px 8px}
.dec-sprint-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t4);padding:6px 4px 3px;display:flex;align-items:center;gap:6px}
.dec-sprint-label::after{content:'';flex:1;height:1px;background:var(--bd)}
.dec-task{display:flex;align-items:center;gap:6px;padding:4px 4px;border-radius:var(--r3);transition:background .15s}
.dec-task:hover{background:rgba(255,255,255,.03)}
.dec-task-check{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:9px}
.dec-task-check.done{background:var(--em);border-color:var(--em)}
.dec-task-check.done::after{content:'✓';color:var(--bg);font-weight:700}
.dec-task-text{flex:1;font-size:11px;color:var(--t2)}
.dec-task-text.done{text-decoration:line-through;color:var(--t4)}
.dec-task-cal{width:20px;height:20px;border-radius:3px;border:none;background:transparent;color:var(--t4);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.dec-task-cal:hover{background:var(--bl2);color:var(--bl)}
.dec-task-rm{width:16px;height:16px;border-radius:50%;border:none;background:transparent;color:var(--t4);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.dec-task-rm:hover{color:var(--rs)}
.dec-add-task{display:flex;align-items:center;gap:4px;padding:3px 4px;cursor:pointer;color:var(--t4);font-size:10px;transition:color .2s;margin-top:2px}
.dec-add-task:hover{color:var(--ac)}

.dec-month-expanded{padding:18px;background:var(--bg1)}
.dec-expanded-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dec-expanded-title{font-family:var(--fd);font-size:18px}
.dec-close-expanded{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px}
.dec-sprints-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.dec-sprint-col{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden}
.dec-sprint-col-h{padding:8px 10px;background:var(--bg3);border-bottom:1px solid var(--bd);font-size:10px;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.08em}
.dec-sprint-col-h.s1{color:var(--ac)}.dec-sprint-col-h.s2{color:var(--em)}.dec-sprint-col-h.s3{color:var(--gd)}.dec-sprint-col-h.s4{color:var(--rs)}
.dec-sprint-col-body{padding:8px;min-height:120px}

.dec-gcal-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;background:var(--bl2);border:1px solid rgba(96,165,250,.3);color:var(--bl);font-family:var(--fb);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:12px}
.dec-gcal-btn:hover{background:rgba(96,165,250,.2)}
.hi{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);cursor:pointer;transition:all .15s;user-select:none}
.hi:hover{border-color:var(--bd2)}
.hc{width:20px;height:20px;border-radius:var(--r3);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hi.yes .hc{background:var(--em);border-color:var(--em)}.hi.yes .hc::after{content:'✓';color:var(--bg);font-size:11px;font-weight:700}
.hi.no .hc{background:var(--rs2);border-color:var(--rs)}.hi.no .hc::after{content:'✗';color:var(--rs);font-size:11px;font-weight:700}
.hl{font-size:12px}

/* SAVE INDICATOR */
.svi{position:fixed;bottom:16px;right:16px;z-index:200;padding:8px 16px;border-radius:99px;font-size:12px;font-weight:500;opacity:0;transition:all .3s;pointer-events:none}
.svi.saving{opacity:1;background:var(--ac3);border:1px solid rgba(200,162,255,.3);color:var(--ac)}
.svi.saved{opacity:1;background:var(--em2);border:1px solid var(--em);color:var(--em)}

/* TOAST */
.toast{position:fixed;top:70px;right:16px;z-index:300;padding:10px 18px;border-radius:var(--r2);background:var(--bg3);border:1px solid var(--em);color:var(--em);font-size:12px;animation:tin .3s,tout .3s 2.5s forwards}
@keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

// ===== SUPABASE CONFIG =====
// Замените эти значения на свои из Supabase Dashboard → Settings → API
const SUPABASE_URL = 'https://mzikjfwohagyowfqdwsx.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_0a0lCROfppd1yu9XvQJgFQ_an9KOlx7';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== STORAGE LAYER (Supabase + localStorage fallback) =====
// Локальный кэш для мгновенного UI
const _cache = {};

// Синхронное чтение из кэша (для UI)
function S(k) {
  if (_cache[k] !== undefined) return _cache[k];
  try { const v = localStorage.getItem(k); const r = v ? JSON.parse(v) : null; _cache[k] = r; return r; } catch { return null; }
}

// Запись: сразу в кэш + localStorage, асинхронно в Supabase
function W(k, v) {
  _cache[k] = v;
  try { if (v === null) { localStorage.removeItem(k); } else { localStorage.setItem(k, JSON.stringify(v)); } } catch {}
  // Async save to Supabase (fire and forget for UI speed)
  _supabaseWrite(k, v).catch(e => console.warn('Supabase write error:', e));
}

async function _supabaseWrite(k, v) {
  if (!SUPABASE_URL || SUPABASE_URL.includes('YOUR_')) return;
  if (v === null) {
    await sb.from('apex_store').delete().eq('key', k);
  } else {
    await sb.from('apex_store').upsert({ key: k, value: v, updated_at: new Date().toISOString() });
  }
}

// Загрузка ВСЕХ данных из Supabase при старте
async function loadAllFromSupabase() {
  if (!SUPABASE_URL || SUPABASE_URL.includes('YOUR_')) return;
  try {
    const { data, error } = await sb.from('apex_store').select('key, value');
    if (error) { console.warn('Supabase load error:', error); return; }
    if (data && data.length > 0) {
      data.forEach(row => {
        _cache[row.key] = row.value;
        try { localStorage.setItem(row.key, JSON.stringify(row.value)); } catch {}
      });
      console.log(`APEX: загружено ${data.length} записей из Supabase`);
    }
  } catch(e) { console.warn('Supabase unavailable, using localStorage:', e); }
}

  if(!code){errEl.textContent='Введите код клиента';errEl.style.display='block';return}
  const cl=S('cl:'+code);
  if(!cl){errEl.textContent='Клиент с кодом «'+code+'» не найден. Проверьте код или обратитесь к коучу.';errEl.style.display='block';return}
  mode='client';currentCode=code;clientInfo=cl;
  clientData=S('d:'+code)||defaultData();
  cl.lastActive=new Date().toISOString();W('cl:'+code,cl);
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  buildClientUI();
}

  if(!clientData.sessNotes) clientData.sessNotes={};

  let totalSess=0, doneSess=0;
  prog.forEach(ph=>ph.sessions.forEach(s=>{totalSess++;if(s.done)doneSess++}));

function editSess(pi,si,field,value){
  clientData.clientProg[pi].sessions[si][field]=value;
  save();
}

function togSessNew(pi,si){
  const s=clientData.clientProg[pi].sessions[si];
  s.done=!s.done;

  // When session marked done AND has homework -> auto-create assignment
  if(s.done && s.hw && s.hw.trim()){
    if(!clientData.assignments) clientData.assignments=[];
    const hwId='hw_'+pi+'_'+si;
    const exists=clientData.assignments.some(a=>a.id===hwId);
    if(!exists){
      clientData.assignments.push({
        id:hwId,
        title:'ДЗ: '+s.hw.substring(0,60),
        description:'Домашнее задание после сессии «'+(s.t||'Сессия '+s.n)+'»:\n\n'+s.hw,
        type:'text',
        fromCoach:true,
        createdAt:new Date().toISOString()
      });
    }
  }

  save();renderProg();renderDash();
  if(s.done && s.hw) renderAssignments();
}

function addSessRow(pi){
  const sessions=clientData.clientProg[pi].sessions;
  const lastN=sessions.length>0?sessions[sessions.length-1].n:0;
  sessions.push({n:lastN+1,t:'',c:'',hw:'',coachComment:'',result:'',done:false});
  save();renderProg();
}

function delSessRow(pi,si){
  clientData.clientProg[pi].sessions.splice(si,1);
  // Renumber
  clientData.clientProg[pi].sessions.forEach((s,i)=>s.n=i+1);
  save();renderProg();
}

// ===== DECOMPOSITION =====
function renderDecomp(){
  // Sync spheres from values block
  const filledValues = clientData.values.filter(v => v && v.trim());
  if(filledValues.length > 0){
    let changed = false;
    filledValues.forEach((val, i) => {
      const name = val.trim();
      if(i < clientData.spheres.length){
        if(clientData.spheres[i].name !== name){ clientData.spheres[i].name = name; changed=true; }
      } else {
        clientData.spheres.push({
          name, yearGoal:'', vision10:'', monthGoals:Array(12).fill(''),
          tasks:Array(12).fill(null).map(()=>[[],[],[],[]])
        });
        changed=true;
      }
    });
    if(clientData.spheres.length > filledValues.length){
      clientData.spheres.splice(filledValues.length);
      changed=true;
    }
    if(changed) save();
  }
  // Migrate old data format if needed
  clientData.spheres.forEach((s,i)=>{
    if(!s.yearGoal && s.yearGoal!=='') s.yearGoal=s.action||'';
    if(!s.monthGoals) s.monthGoals=s.months||Array(12).fill('');
    if(!s.tasks) s.tasks=Array(12).fill(null).map(()=>[[],[],[],[]]);
    // Ensure each month has 4 sprint arrays
    s.tasks.forEach((sprints,mi)=>{if(!Array.isArray(sprints)||sprints.length!==4) s.tasks[mi]=[[],[],[],[]]});
  });

  let h=`<div class="pg-h"><h2>Годовая декомпозиция</h2><p>Сферы × 12 месяцев × 4 спринта. Нажмите на месяц для раскрытия задач.</p></div><div class="pg-b">`;

  // Add sphere button
  h+=`<div class="irow" style="margin-bottom:18px"><input id="newSphName" placeholder="Добавить новую сферу..."><button class="btn btn-a" onclick="addSphere()">+ Сфера</button></div>`;

  clientData.spheres.forEach((sph,si)=>{
    h+=`<div class="dec-sphere" id="dsph_${si}">`;
    // Header
    h+=`<div class="dec-sphere-h" onclick="document.getElementById('dsph_${si}').classList.toggle('open')">
      <div class="dec-sphere-left">
        <div class="dec-sphere-name">${sph.name}</div>
        <div class="dec-sphere-goal">${sph.yearGoal||'Нет цели на год'}</div>
      </div><div class="dec-sphere-arrow">▼</div></div>`;

    // Body
    h+=`<div class="dec-sphere-body">`;
    // Year goal row
    h+=`<div class="dec-year-row">
      <label>🎯 Цель на год</label>
      <input value="${esc(sph.yearGoal)}" placeholder="Например: выйти на доход 5000€/мес" oninput="clientData.spheres[${si}].yearGoal=this.value;save()">
    </div>`;
    // 10-year vision row
    h+=`<div class="dec-year-row" style="background:var(--bg2)">
      <label style="color:var(--gd)">🔭 К цели на 10 лет</label>
      <input value="${esc(sph.vision10||'')}" placeholder="Как эта годовая цель ведёт к вашему 10-летнему видению?" style="color:var(--gd)" oninput="clientData.spheres[${si}].vision10=this.value;save()">
    </div>`;

    // Months scroll
    h+=`<div class="dec-months">`;
    months.forEach((m,mi)=>{
      const tasks=sph.tasks[mi];
      const totalTasks=tasks.reduce((s,sp)=>s+sp.length,0);
      const doneTasks=tasks.reduce((s,sp)=>s+sp.filter(t=>t.done).length,0);

// ===== GOOGLE CALENDAR SYNC =====
function addToGCal(si,mi,spi,ti){
  const sph=clientData.spheres[si];
  const task=sph.tasks[mi][spi][ti];
  const year=new Date().getFullYear();
  const month=mi+1;
  // Approximate week start based on sprint
  const weekStart=1+spi*7;
  const day=Math.min(weekStart,28);
  const dateStr=`${year}${String(month).padStart(2,'0')}${String(day).padStart(2,'0')}`;
  const title=encodeURIComponent(`[${sph.name}] ${task.text}`);
  const details=encodeURIComponent(`Сфера: ${sph.name}\nЦель месяца: ${sph.monthGoals[mi]}\nСпринт ${spi+1}`);
  const url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}/${dateStr}&details=${details}`;
  window.open(url,'_blank');
  toast('Открыт Google Calendar');
}

function syncMonthToGCal(si,mi){
  const sph=clientData.spheres[si];
  const year=new Date().getFullYear();
  const month=mi+1;
  const allTasks=[];
  sph.tasks[mi].forEach((sprint,spi)=>{
    sprint.forEach(task=>{
      if(!task.done){
        const day=Math.min(1+spi*7,28);
        allTasks.push({text:task.text,day,spi});
      }
    });
  });
  if(allTasks.length===0){toast('Нет незавершённых задач','rs');return}

  // Open first task, show instructions for the rest
  const first=allTasks[0];
  const dateStr=`${year}${String(month).padStart(2,'0')}${String(first.day).padStart(2,'0')}`;
  const title=encodeURIComponent(`[${sph.name}] ${first.text}`);
  const allText=allTasks.map((t,i)=>`${i+1}. [Спринт ${t.spi+1}] ${t.text}`).join('\n');
  const details=encodeURIComponent(`Сфера: ${sph.name}\nЦель: ${sph.monthGoals[mi]}\n\nВсе задачи месяца:\n${allText}`);
  const url=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateStr}/${dateStr}&details=${details}`;
  window.open(url,'_blank');
  toast(`${allTasks.length} задач → Google Calendar`);
}

// ===== BACKLOG =====
function renderBacklog(){
  // Collect ALL tasks from ALL spheres, ALL months, ALL sprints into one flat list
  const allTasks=[];
  clientData.spheres.forEach((sph,si)=>{
    sph.tasks.forEach((sprints,mi)=>{
      sprints.forEach((sprint,spi)=>{
        sprint.forEach((task,ti)=>{
          allTasks.push({
            sphere:sph.name, month:months[mi], sprint:spi+1,
            text:task.text, done:task.done,
            si,mi,spi,ti
          });
        });
      });
    });
  });

  const pending=allTasks.filter(t=>!t.done);
  const completed=allTasks.filter(t=>t.done);

  let h=`<div class="pg-h"><h2>Backlog</h2><p>Все задачи из всех спринтов в одном месте — ${pending.length} в работе, ${completed.length} выполнено</p></div><div class="pg-b">`;

  // Filter controls
  h+=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <button class="pre on" onclick="filterBacklog('all',this)">Все (${allTasks.length})</button>
    <button class="pre" onclick="filterBacklog('pending',this)">В работе (${pending.length})</button>
    <button class="pre" onclick="filterBacklog('done',this)">Выполнено (${completed.length})</button>
  </div>`;

  // Group by sphere
  const sphereNames=[...new Set(allTasks.map(t=>t.sphere))];

  sphereNames.forEach(sn=>{
    const sphereTasks=allTasks.filter(t=>t.sphere===sn);
    if(sphereTasks.length===0)return;
    const sDone=sphereTasks.filter(t=>t.done).length;

    h+=`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:13px;font-weight:600">${sn}</div>
        <div style="font-family:var(--fm);font-size:11px;color:${sDone===sphereTasks.length?'var(--em)':'var(--t4)'}">${sDone}/${sphereTasks.length}</div>
      </div>
      <div class="tk" data-backlog-sphere="${sn}">`;

    sphereTasks.forEach(t=>{
      const sprintColors=['var(--ac)','var(--em)','var(--gd)','var(--rs)'];
      h+=`<div class="tk-i backlog-item ${t.done?'backlog-done':'backlog-pending'}" style="border-left:3px solid ${sprintColors[t.spi]}">
        <div class="tk-c ${t.done?'done':''}" onclick="togDecTask(${t.si},${t.mi},${t.spi},${t.ti});renderBacklog();renderDecomp()"></div>
        <div style="flex:1">
          <div class="tk-t ${t.done?'dn':''}">${esc(t.text)}</div>
          <div style="font-size:9px;color:var(--t4);margin-top:1px">${t.month} · Спринт ${t.sprint}</div>
        </div>
        <button class="dec-task-cal" onclick="addToGCal(${t.si},${t.mi},${t.spi},${t.ti})" title="Google Calendar">📅</button>
      </div>`;
    });

    h+=`</div></div>`;
  });

  if(allTasks.length===0) h+=`<p style="color:var(--t4);font-size:13px">Нет задач. Добавьте их в Декомпозиции → раскройте месяц → добавьте задачи в спринты.</p>`;
  h+=`</div>`;
  document.getElementById('p_backlog').innerHTML=h;
}

function filterBacklog(filter,btn){
  document.querySelectorAll('.pg-b .pre').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.backlog-item').forEach(el=>{
    if(filter==='all') el.style.display='';
    else if(filter==='pending') el.style.display=el.classList.contains('backlog-pending')?'':'none';
    else el.style.display=el.classList.contains('backlog-done')?'':'none';
  });
}

function renderFinance(){

  const pricePerMinute=f.totalSessions>0?Math.round(f.totalPrice/(f.totalSessions*mps)*100)/100:0;

  for(let i=2;i<=Math.max(maxInstall,1);i++) installOpts+=`<option value="${i}">Рассрочка на ${i} части</option>`;

  modal.innerHTML=`

      <div id="ord_calc" style="margin-bottom:12px"></div>
      <div style="margin-bottom:12px"><div style="font-size:10px;color:var(--t4);margin-bottom:4px">Предпочтительный день оплаты</div>
        <select id="ord_day" style="width:100%;padding:10px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r3);color:var(--t1);font-family:var(--fb);font-size:13px;outline:none">
          <option>1-е число</option><option>5-е число</option><option>10-е число</option><option>15-е число</option><option>20-е число</option><option>25-е число</option></select></div>
      <div style="margin-bottom:16px"><div style="font-size:10px;color:var(--t4);margin-bottom:4px">Комментарий</div>
        <textarea id="ord_comment" class="jta" style="min-height:60px" placeholder="Дополнительные пожелания..."></textarea></div>
      <button class="btn btn-a" style="width:100%" onclick="submitOrder('${id}','${name}',${price},${sessions},${mins})">Отправить заявку</button>
    </div>
  </div>`;
  calcInstallment(price,1);
}

function calcInstallment(price,parts){
  parts=parseInt(parts)||1;
  const perPart=Math.ceil(price/parts);
  const el=document.getElementById('ord_calc');
  if(!el)return;
  if(parts===1) el.innerHTML=`<div style="font-size:13px;color:var(--em)">Единоразовый платёж: <b>${price.toLocaleString('ru-RU')} ₽</b></div>`;
  else{
    let html=`<div style="font-size:13px;color:var(--gd);margin-bottom:6px">Рассрочка на ${parts} частей:</div>`;
    for(let i=1;i<=parts;i++){
      const isLast=i===parts;
      const amt=isLast?price-perPart*(parts-1):perPart;
      html+=`<div style="font-size:12px;color:var(--t2);padding:3px 0">Платёж ${i}: <b style="color:var(--ac)">${amt.toLocaleString('ru-RU')} ₽</b></div>`;
    }
    el.innerHTML=html;
  }
}

function submitOrder(id,name,price,sessions,mins){
  const install=document.getElementById('ord_install')?.value||'1';
  const day=document.getElementById('ord_day')?.value||'1-е число';
  const comment=document.getElementById('ord_comment')?.value||'';
  // Save order to client data
  if(!clientData.orders) clientData.orders=[];
  clientData.orders.push({tariffId:id,name,price,sessions,mins,installments:install,payDay:day,comment,date:new Date().toISOString()});
  save();
  document.getElementById('orderModal').innerHTML='';
  toast('Заявка отправлена! Анастасия свяжется с вами.');
}

  if(!title){toast('Введите название','rs');return}

  const questions=[];
  if(type==='questions'){
    document.querySelectorAll('.aa-q-input').forEach((inp,i)=>{
      const q=inp.value.trim();
      if(q) questions.push({q, key:'custom_'+Date.now()+'_'+i});
    });
    if(questions.length===0){toast('Добавьте хотя бы 1 вопрос','rs');return}
  }

  const assignment={
    id:'a_'+Date.now(), title, description:desc, type, questions,
    fromCoach:true, createdAt:new Date().toISOString()
  };

  // Send to target client(s)
  const codes=targetClient==='all'?(S('clients-idx')||[]):[targetClient];
  codes.forEach(code=>{
    const d=S('d:'+code)||defaultData();
    if(!d.assignments) d.assignments=[];
    d.assignments.push(assignment);
    W('d:'+code,d);
  });

  // Save to admin sent log
  const sent=S('admin-assignments')||[];
  sent.unshift({...assignment, sentTo:targetClient==='all'?'Всем':S('cl:'+targetClient)?.name||targetClient, sentAt:new Date().toISOString()});
  W('admin-assignments',sent);

  document.getElementById('aa_title').value='';
  document.getElementById('aa_desc').value='';
  document.getElementById('aa_qlist').innerHTML='';
  addAdminQ();
  renderSentAssignments();
  toast(`Задание отправлено ${codes.length} клиенту(ам)`);
}

function cpLink(code){
  const link=location.origin+location.pathname+'#'+code;
  // Try clipboard API first, then textarea fallback, then prompt
  const fallback=()=>{
    const ta=document.createElement('textarea');ta.value=code;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');toast('Код скопирован: '+code);} catch(e){prompt('Код клиента (скопируйте вручную):',code)}
    document.body.removeChild(ta);
  };
  try{navigator.clipboard.writeText(code).then(()=>toast('Код скопирован: '+code)).catch(fallback)}catch(e){fallback()}
}

function addMedia(type){
  document.getElementById('mediaVideoAdd').style.display=type==='video'?'block':'none';
  document.getElementById('mediaBookAdd').style.display=type==='book'?'block':'none';
}

function previewYT(url){
  const r=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  const el=document.getElementById('mv_preview');
  if(!el)return;
  if(r){
    el.innerHTML=`<img src="https://img.youtube.com/vi/${r[1]}/mqdefault.jpg" style="width:100%;max-width:320px;border-radius:var(--r2);margin-top:6px">`;
  } else {
    el.innerHTML='';
  }
}

function saveMedia(type){
  if(!clientData.media) clientData.media={videos:[],books:[]};
  if(type==='video'){
    const url=document.getElementById('mv_url').value.trim();
    if(!url){toast('Введите ссылку','rs');return}
    const title=document.getElementById('mv_title').value.trim();
    const comment=document.getElementById('mv_comment').value.trim();
    clientData.media.videos.push({url,title:title||'Видео',comment});
    document.getElementById('mv_url').value='';
    document.getElementById('mv_title').value='';
    document.getElementById('mv_comment').value='';
    document.getElementById('mediaVideoAdd').style.display='none';
  } else {
    const url=document.getElementById('mb_url').value.trim();
    const title=document.getElementById('mb_title').value.trim();
    const author=document.getElementById('mb_author').value.trim();
    const comment=document.getElementById('mb_comment').value.trim();
    if(!title&&!url){toast('Введите название или ссылку','rs');return}
    clientData.media.books.push({url,title:title||'Книга',author,comment});
    document.getElementById('mb_url').value='';
    document.getElementById('mb_title').value='';
    document.getElementById('mb_author').value='';
    document.getElementById('mb_comment').value='';
    document.getElementById('mediaBookAdd').style.display='none';
  }
  save();renderMedia();toast('Сохранено');
}

    'Видение,5 лет,',
    'Видение,10 лет,',
    ...clientData.values.map((_,i)=>`Ценности,Ценность ${i+1},`),
    ...clientData.spheres.map(s=>`Сфера,${s.name},Цель на год: `),
  ];
  clientData.spheres.forEach(s=>{
    ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'].forEach(m=>{
      lines.push(`Декомпозиция ${s.name},${m},`);
    });
  });
  const blob=new Blob(['\ufeff'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='apex_template.csv';a.click();
  toast('Шаблон скачан (CSV — откройте в Excel)');
}

async function importXLS(file){
  if(!file)return;
  const status=document.getElementById('importStatus');
  status.innerHTML='<div style="color:var(--gd);font-size:12px">⏳ Загрузка...</div>';

  try{
    const text=await file.text();
    const lines=text.split('\n').map(l=>l.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));

    let imported=0;
    lines.forEach(cols=>{
      if(cols.length<3||!cols[2])return;
      const section=cols[0],field=cols[1],value=cols[2];

      if(section==='Видение'){
        if(field.includes('1 год')){clientData.vision.y1=value;imported++}
        if(field.includes('3 года')){clientData.vision.y3=value;imported++}
        if(field.includes('5 лет')){clientData.vision.y5=value;imported++}
        if(field.includes('10 лет')){clientData.vision.y10=value;imported++}
      }
      if(section==='Ценности'){
        const idx=parseInt(field.replace(/\D/g,''))-1;
        if(idx>=0&&idx<clientData.values.length){clientData.values[idx]=value;imported++}
        else{clientData.values.push(value);imported++}
      }
      if(section==='Сфера'){
        const sph=clientData.spheres.find(s=>s.name===field);
        if(sph&&value.startsWith('Цель на год:')){sph.yearGoal=value.replace('Цель на год:','').trim();imported++}
      }
      if(section.startsWith('Декомпозиция ')){
        const sphName=section.replace('Декомпозиция ','');
        const sph=clientData.spheres.find(s=>s.name===sphName);
        const mIdx=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'].indexOf(field);
        if(sph&&mIdx>=0){sph.monthGoals[mIdx]=value;imported++}
      }
    });

    save();
    status.innerHTML=`<div style="color:var(--em);font-size:12px">✓ Импортировано ${imported} полей. Обновите страницу для отображения.</div>`;
    toast(`Импортировано ${imported} полей`);
  }catch(e){
    status.innerHTML=`<div style="color:var(--rs);font-size:12px">✗ Ошибка: ${e.message}</div>`;
  }
}

// ===== ADMIN PROGRAM TEMPLATE EDITOR =====
function renderAdminProg(){
  const template=S('prog-template')||defaultProgram;
  const codes=S('clients-idx')||[];

  let h=`<div class="pg-h"><h2>Шаблон программы сессий</h2><p>Редактируйте темы по умолчанию. Изменения применяются к новым клиентам.</p></div><div class="pg-b">`;

  h+=`<div style="display:flex;gap:8px;margin-bottom:20px">
    <button class="btn btn-a" onclick="saveProgTemplate()">💾 Сохранить шаблон</button>
    <button class="btn btn-g" onclick="if(confirm('Сбросить к оригиналу?')){W('prog-template',null);renderAdminProg();toast('Сброшено')}">↺ Сбросить</button>
    <select id="applyProgClient" style="padding:8px 12px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r3);color:var(--t1);font-family:var(--fb);font-size:12px;outline:none">
      <option value="">Применить к клиенту...</option>
      ${codes.map(c=>{const cl=S('cl:'+c);return cl?`<option value="${c}">${cl.name}</option>`:''}).join('')}
      <option value="__all__">Всем клиентам</option>
    </select>
    <button class="btn btn-g" onclick="applyProgToClient()">Применить</button>
  </div>`;

  template.forEach((ph,pi)=>{
    h+=`<div style="font-family:var(--fd);font-size:16px;color:var(--gd);margin:20px 0 10px;display:flex;align-items:center;gap:8px">
      <input value="${esc(ph.phase)}" style="background:transparent;border:none;color:var(--gd);font-family:var(--fd);font-size:16px;font-weight:500;outline:none" onchange="adminProgEdit(${pi},'phase',this.value)">
      <span style="font-family:var(--fm);font-size:10px;color:var(--t4);background:var(--bg3);padding:2px 8px;border-radius:99px">${ph.sessions.length}</span>
    </div>`;

    ph.sessions.forEach((s,si)=>{
      h+=`<div class="tk-i" style="gap:6px">
        <span style="font-family:var(--fm);font-size:10px;color:var(--t4);min-width:28px;text-align:center">${s.n}</span>
        <input value="${esc(s.t)}" placeholder="Тема сессии..." style="flex:2;background:transparent;border:1px dashed var(--bd);border-radius:var(--r3);padding:6px 8px;color:var(--t1);font-family:var(--fb);font-size:12px;outline:none" onchange="adminProgEdit(${pi},'t',this.value,${si})">
        <input value="${esc(s.c||'')}" placeholder="Комментарий..." style="flex:1;background:transparent;border:1px dashed var(--bd);border-radius:var(--r3);padding:6px 8px;color:var(--t3);font-family:var(--fb);font-size:11px;outline:none" onchange="adminProgEdit(${pi},'c',this.value,${si})">
        <input value="${esc(s.hw||'')}" placeholder="ДЗ..." style="flex:1;background:transparent;border:1px dashed var(--bd);border-radius:var(--r3);padding:6px 8px;color:var(--bl);font-family:var(--fb);font-size:11px;outline:none" onchange="adminProgEdit(${pi},'hw',this.value,${si})">
        <button class="tk-x" onclick="adminProgDel(${pi},${si})">×</button>
      </div>`;
    });

    h+=`<button class="btn btn-g" style="margin:6px 0 0;font-size:10px" onclick="adminProgAdd(${pi})">+ Добавить сессию</button>`;
  });

  h+=`<button class="btn btn-g" style="margin:20px 0;font-size:12px" onclick="adminProgAddPhase()">+ Добавить фазу</button>`;
  h+=`</div>`;
  document.getElementById('p_aprog').innerHTML=h;
}

function getAdminTemplate(){return S('prog-template')||JSON.parse(JSON.stringify(defaultProgram))}

function adminProgEdit(pi,field,value,si){
  const t=getAdminTemplate();
  if(field==='phase') t[pi].phase=value;
  else t[pi].sessions[si][field]=value;
  W('prog-template',t);
}

function adminProgDel(pi,si){
  const t=getAdminTemplate();
  t[pi].sessions.splice(si,1);
  W('prog-template',t);
  renderAdminProg();
}

function adminProgAdd(pi){
  const t=getAdminTemplate();
  const lastN=t[pi].sessions.length>0?t[pi].sessions[t[pi].sessions.length-1].n:0;
  t[pi].sessions.push({n:lastN+1,t:'',c:'',hw:''});
  W('prog-template',t);
  renderAdminProg();
}

function adminProgAddPhase(){
  const t=getAdminTemplate();
  const name=prompt('Название новой фазы:');
  if(!name)return;
  t.push({phase:name,sessions:[{n:1,t:'',c:'',hw:''}]});
  W('prog-template',t);
  renderAdminProg();
}

function saveProgTemplate(){
  const t=getAdminTemplate();
  W('prog-template',t);
  toast('Шаблон сохранён');
}

function applyProgToClient(){
  const sel=document.getElementById('applyProgClient');
  const val=sel?.value;if(!val)return;
  const t=getAdminTemplate();
  if(val==='__all__'){
    const codes=S('clients-idx')||[];
    codes.forEach(c=>W('prog:'+c,JSON.parse(JSON.stringify(t))));
    toast(`Применено к ${codes.length} клиентам`);
  } else {
    W('prog:'+val,JSON.parse(JSON.stringify(t)));
    const cl=S('cl:'+val);
    toast(`Применено к ${cl?.name||val}`);
  }
}
